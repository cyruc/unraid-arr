---
- name: Deploy ARR Stack with Gluetun on Unraid
  hosts: unraid
  become: true
  collections:
    - community.docker
  vars:
    appdata_path: "/mnt/user/appdata"
    # Single /data share — enables hardlinks and atomic moves
    # Structure: /mnt/user/data/{torrents/{movies,tv},media/{movies,tv}}
    data_path: "/mnt/user/data"
    pia_user: "{{ vault_pia_user }}"
    pia_pass: "{{ vault_pia_pass }}"
    timezone: "America/Los_Angeles"
    umask: "002"
    uid: 99  # nobody
    gid: 100  # users

  tasks:
    # --- Folder structure (Trash Guides recommended) ---
    - name: Create unified data directories for hardlinks
      file:
        path: "{{ data_path }}/{{ item }}"
        state: directory
        mode: '0775'
        owner: "{{ uid }}"
        group: "{{ gid }}"
      loop:
        - torrents/movies
        - torrents/tv
        - media/movies
        - media/tv

    - name: Create appdata directories
      file:
        path: "{{ appdata_path }}/{{ item }}"
        state: directory
        mode: '0775'
        owner: "{{ uid }}"
        group: "{{ gid }}"
      loop:
        - gluetun
        - prowlarr
        - radarr
        - sonarr
        - qbittorrent

    # --- Networking ---
    - name: Create Docker networks
      docker_network:
        name: "{{ item }}"
        state: present
      loop:
        - arr_backend
        - vpn_net

    # --- Gluetun VPN Gateway ---
    - name: Deploy Gluetun (PIA WireGuard)
      docker_container:
        name: gluetun
        image: qmcgaw/gluetun:latest
        state: started
        restart_policy: unless-stopped
        capabilities: [NET_ADMIN]
        networks:
          - name: vpn_net
        ports:
          - "6888:6888"
          - "6888:6888/udp"
          - "9696:9696"   # Prowlarr
          - "8080:8080"   # qBittorrent
        volumes:
          - "{{ appdata_path }}/gluetun:/gluetun"
        env:
          VPN_SERVICE_PROVIDER: pia
          VPN_TYPE: wireguard
          WIREGUARD_PRIVATE_KEY: "{{ vault_wg_key | default('') }}"
          WIREGUARD_ADDRESS: "10.13.13.2/24"
          SERVER_COUNTRIES: Canada
          TZ: "{{ timezone }}"
          DNS_ADDRESS: "127.0.0.11,9.9.9.9"
          DOT: "off"
          HTTPPROXY: "off"
          PUID: "{{ uid }}"
          PGID: "{{ gid }}"
          UMASK: "{{ umask }}"
        memory: 512M
        healthcheck:
          test: ["CMD", "ping", "-c1", "8.8.8.8"]
          interval: 30s
          retries: 3

    - name: Wait for Gluetun healthy
      docker_container_info:
        name: gluetun
      register: gluetun_info
      until: gluetun_info.container.State.Health.Status == "healthy"
      retries: 20
      delay: 10

    # --- Download client ---
    - name: Deploy qBittorrent (VPN routed via Gluetun)
      docker_container:
        name: qbittorrent
        image: ghcr.io/hotio/qbittorrent:latest
        state: started
        restart_policy: unless-stopped
        networks:
          - name: vpn_net
          - name: arr_backend
        networks_cli_compatible: yes
        volumes:
          - "{{ appdata_path }}/qbittorrent:/config"
          - "{{ data_path }}/torrents:/data/torrents"
        env:
          PUID: "{{ uid }}"
          PGID: "{{ gid }}"
          UMASK: "{{ umask }}"
          TZ: "{{ timezone }}"
        memory: 2G

    # --- Indexer manager ---
    - name: Deploy Prowlarr (VPN routed)
      docker_container:
        name: prowlarr
        image: ghcr.io/hotio/prowlarr:latest
        state: started
        restart_policy: unless-stopped
        networks:
          - name: vpn_net
          - name: arr_backend
        networks_cli_compatible: yes
        volumes:
          - "{{ appdata_path }}/prowlarr:/config"
        env:
          PUID: "{{ uid }}"
          PGID: "{{ gid }}"
          UMASK: "{{ umask }}"
          TZ: "{{ timezone }}"
        memory: 1G

    # --- Media managers ---
    # Radarr and Sonarr get the full /data mount so they can
    # hardlink from /data/torrents/* to /data/media/*
    - name: Deploy Radarr
      docker_container:
        name: radarr
        image: ghcr.io/hotio/radarr:latest
        state: started
        restart_policy: unless-stopped
        networks:
          - name: arr_backend
        ports:
          - "7878:7878"
        volumes:
          - "{{ appdata_path }}/radarr:/config"
          - "{{ data_path }}:/data"
        env:
          PUID: "{{ uid }}"
          PGID: "{{ gid }}"
          UMASK: "{{ umask }}"
          TZ: "{{ timezone }}"
        memory: 1G

    - name: Deploy Sonarr
      docker_container:
        name: sonarr
        image: ghcr.io/hotio/sonarr:latest
        state: started
        restart_policy: unless-stopped
        networks:
          - name: arr_backend
        ports:
          - "8989:8989"
        volumes:
          - "{{ appdata_path }}/sonarr:/config"
          - "{{ data_path }}:/data"
        env:
          PUID: "{{ uid }}"
          PGID: "{{ gid }}"
          UMASK: "{{ umask }}"
          TZ: "{{ timezone }}"
        memory: 1G
